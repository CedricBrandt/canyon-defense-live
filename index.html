                    ctx.fillStyle = '#3a3'; ctx.beginPath(); ctx.arc(tx, ty, bldgR, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#5c5'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(tx, ty, bldgR, 0, Math.PI*2); ctx.stroke();
                    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(bldgR*1.2)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('\u267B', tx, ty);
                } else if (def.building === 'radar') {
                    // Dome
                    const g = ctx.createRadialGradient(tx-3, ty-3, 0, tx, ty, bldgR);
                    g.addColorStop(0, '#8af'); g.addColorStop(1, '#346');
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.arc(tx, ty, bldgR, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#58f'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.arc(tx, ty, bldgR, 0, Math.PI*2); ctx.stroke();
                    // Dish (rotates slowly)
                    const ra = (Date.now() / 2000) % (Math.PI * 2);
                    ctx.strokeStyle = '#adf'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(tx, ty);
                    ctx.lineTo(tx + Math.cos(ra)*(bldgR-2), ty + Math.sin(ra)*(bldgR-2)); ctx.stroke();
                    // Range ring
                    ctx.beginPath(); ctx.arc(tx, ty, tower.range, 0, Math.PI*2);
                    ctx.strokeStyle = 'rgba(88,136,255,0.15)'; ctx.lineWidth = 1; ctx.stroke();
                } else if (def.building === 'lab') {
                    const bs = bldgR;
                    ctx.fillStyle = '#7ac'; ctx.fillRect(tx-bs, ty-bs, bs*2, bs*2);
                    ctx.fillStyle = '#9ce'; ctx.fillRect(tx-bs+3, ty-bs+3, bs*1.4, bs*0.6);
                    ctx.strokeStyle = '#aef'; ctx.lineWidth = 1; ctx.strokeRect(tx-bs, ty-bs, bs*2, bs*2);
                    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(bldgR)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('\u2697', tx, ty+2);
                }

            } else {
                // Combat tower rendering
                // Octagonal concrete platform
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const pa = Math.PI/8 + Math.PI/4*i;
                    const px = tx + Math.cos(pa)*baseR, py = ty + Math.sin(pa)*baseR;
                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.closePath();
                const bg = ctx.createRadialGradient(tx-2, ty-2, 0, tx, ty, baseR+1);
                bg.addColorStop(0, '#585858'); bg.addColorStop(0.6, '#3e3e3e'); bg.addColorStop(1, '#282828');
                ctx.fillStyle = bg; ctx.fill();
                ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1.5; ctx.stroke();
                // Platform detail ring
                ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(tx, ty, baseR*0.8, 0, Math.PI*2); ctx.stroke();
                // Corner rivets
                for (let i = 0; i < 4; i++) {
                    const ra = Math.PI/2*i + Math.PI/4;
                    ctx.fillStyle = '#666'; ctx.beginPath();
                    ctx.arc(tx + Math.cos(ra)*baseR*0.83, ty + Math.sin(ra)*baseR*0.83, 1, 0, Math.PI*2); ctx.fill();
                }
                // Color accent ring
                ctx.strokeStyle = def.color; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(tx, ty, baseR*0.6, 0, Math.PI*2); ctx.stroke();

                const a = tower.angle;
                const ca = Math.cos(a), sa = Math.sin(a);
                const sc = baseR / 15; // scale relative to original 15px base

                if (def.id === 'missile') {
                    // Missile launcher box with tube openings
                    ctx.save(); ctx.translate(tx, ty); ctx.rotate(a);
                    ctx.fillStyle = '#3a7a5a';
                    ctx.fillRect(-4*sc, -5*sc, 14*sc, 10*sc);
                    ctx.strokeStyle = '#2a5a3a'; ctx.lineWidth = 1;
                    ctx.strokeRect(-4*sc, -5*sc, 14*sc, 10*sc);
                    // Missile tube openings (2x2 grid)
                    ctx.fillStyle = '#1a3a2a';
                    ctx.fillRect(2*sc, -4*sc, 6*sc, 3*sc); ctx.fillRect(2*sc, 1*sc, 6*sc, 3*sc);
                    // Missile tips visible in tubes
                    ctx.fillStyle = '#ddd';
                    ctx.fillRect(7*sc, -3.5*sc, 2*sc, 2*sc); ctx.fillRect(7*sc, 1.5*sc, 2*sc, 2*sc);
                    // Targeting sensor
                    ctx.fillStyle = '#f44'; ctx.beginPath(); ctx.arc(-1*sc, -6*sc, 1.5*sc, 0, Math.PI*2); ctx.fill();
                    ctx.restore();

                } else if (def.id === 'howitzer') {
                    // Artillery cannon with armored turret
                    ctx.save(); ctx.translate(tx, ty); ctx.rotate(a);
                    // Armored turret housing
                    ctx.fillStyle = '#8a5030';
                    ctx.beginPath(); ctx.arc(-1*sc, 0, 7*sc, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#6a3a20'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.arc(-1*sc, 0, 7*sc, 0, Math.PI*2); ctx.stroke();
                    // Heavy barrel
                    ctx.fillStyle = '#7a4a2a'; ctx.fillRect(4*sc, -3*sc, 12*sc, 6*sc);
                    // Barrel bore
                    ctx.fillStyle = '#3a2010'; ctx.fillRect(14*sc, -1.5*sc, 3*sc, 3*sc);
                    // Muzzle brake
                    ctx.fillStyle = '#5a3a1a'; ctx.fillRect(15*sc, -4*sc, 2*sc, 8*sc);
                    // Turret hatch
                    ctx.fillStyle = '#6a3a20'; ctx.beginPath(); ctx.arc(-2*sc, 0, 3*sc, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#4a2a10'; ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.arc(-2*sc, 0, 3*sc, 0, Math.PI*2); ctx.stroke();
                    ctx.restore();

                } else if (def.id === 'tesla') {
                    // Tesla coil with lightning arcs
                    const tg = ctx.createRadialGradient(tx, ty, 0, tx, ty, 7);
                    tg.addColorStop(0, '#aaccff'); tg.addColorStop(0.5, '#5599ff'); tg.addColorStop(1, '#223388');
                    ctx.fillStyle = tg; ctx.beginPath(); ctx.arc(tx, ty, 7, 0, Math.PI*2); ctx.fill();
                    // Coil windings
                    ctx.strokeStyle = 'rgba(136,187,255,0.5)'; ctx.lineWidth = 0.8;
                    for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.arc(tx, ty, 3+i*1.8, 0, Math.PI*2); ctx.stroke(); }
                    // Top capacitor sphere
                    const cg = ctx.createRadialGradient(tx-1, ty-1, 0, tx, ty, 4);
                    cg.addColorStop(0, '#fff'); cg.addColorStop(0.5, '#aaddff'); cg.addColorStop(1, '#4488cc');
                    ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(tx, ty, 4, 0, Math.PI*2); ctx.fill();
                    // Animated lightning arcs to 4 points
                    const lt = Date.now() / 80;
                    ctx.strokeStyle = 'rgba(120,180,255,0.7)'; ctx.lineWidth = 1.5;
                    for (let i = 0; i < 4; i++) {
                        const la = a + i*Math.PI/2;
                        const lca = Math.cos(la), lsa = Math.sin(la);
                        ctx.beginPath();
                        ctx.moveTo(tx + lca*5, ty + lsa*5);
                        ctx.lineTo(tx + lca*9 + Math.sin(lt+i*2)*2, ty + lsa*9 + Math.cos(lt+i*2)*2);
                        ctx.lineTo(tx + lca*13, ty + lsa*13);
                        ctx.stroke();
                        ctx.fillStyle = '#ddeeff'; ctx.beginPath();
                        ctx.arc(tx + lca*13, ty + lsa*13, 1.5, 0, Math.PI*2); ctx.fill();
                    }

                } else if (def.id === 'gatling') {
                    // Rotating minigun with barrel assembly
                    ctx.save(); ctx.translate(tx, ty); ctx.rotate(a);
                    // Barrel shroud
                    ctx.fillStyle = '#553333'; ctx.fillRect(-2, -4, 17, 8);
                    ctx.strokeStyle = '#331a1a'; ctx.lineWidth = 0.5; ctx.strokeRect(-2, -4, 17, 8);
                    // Rotating barrel bundle
                    const spin = (Date.now()/40) % (Math.PI*2);
                    for (let i = 0; i < 6; i++) {
                        const ba = spin + i*Math.PI/3;
                        const bx = Math.cos(ba)*2.5, by = Math.sin(ba)*2.5;
                        ctx.strokeStyle = i%2===0 ? '#cc5555' : '#994444'; ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.moveTo(5+bx, by); ctx.lineTo(16+bx*0.3, by*0.3); ctx.stroke();
                    }
                    // Barrel hub
                    ctx.fillStyle = '#442222'; ctx.beginPath(); ctx.arc(4, 0, 4, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#663333'; ctx.beginPath(); ctx.arc(4, 0, 2, 0, Math.PI*2); ctx.fill();
                    // Muzzle ring
                    ctx.strokeStyle = '#884444'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.arc(16, 0, 3, 0, Math.PI*2); ctx.stroke();
                    // Ammo feed box
                    ctx.fillStyle = '#664422'; ctx.fillRect(-3, 4, 7, 4);
                    ctx.fillStyle = '#ccaa44';
                    for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.arc(-1+i*2.5, 6, 1, 0, Math.PI*2); ctx.fill(); }
                    ctx.restore();

                } else if (def.id === 'nullifier') {
                    // Parabolic dish emitter
                    ctx.save(); ctx.translate(tx, ty); ctx.rotate(a);
                    // Support arm
                    ctx.strokeStyle = '#7744aa'; ctx.lineWidth = 3; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(9, 0); ctx.stroke();
                    // Parabolic dish
                    ctx.fillStyle = '#9966cc';
                    ctx.beginPath(); ctx.arc(12, 0, 7, -1.2, 1.2); ctx.lineTo(8, 0); ctx.closePath(); ctx.fill();
                    ctx.strokeStyle = '#bb88ee'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.arc(12, 0, 7, -1.2, 1.2); ctx.stroke();
                    // Feed horn
                    ctx.fillStyle = '#ddaaff'; ctx.beginPath(); ctx.arc(10, 0, 2, 0, Math.PI*2); ctx.fill();
                    // Energy glow
                    ctx.fillStyle = 'rgba(180,120,255,0.3)'; ctx.beginPath(); ctx.arc(13, 0, 4, 0, Math.PI*2); ctx.fill();
                    // Central hub
                    ctx.fillStyle = '#553388'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#7744aa'; ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.restore();

                } else if (def.id === 'aa') {
                    // Anti-aircraft dual gun mount
                    ctx.save(); ctx.translate(tx, ty); ctx.rotate(a);
                    // Gun mount base
                    ctx.fillStyle = '#557799'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
                    // Dual barrels
                    for (const off of [-3, 3]) {
                        ctx.fillStyle = '#7799bb'; ctx.fillRect(3, off-1.5, 13, 3);
                        ctx.fillStyle = '#99bbdd'; ctx.fillRect(14, off-2, 2, 4);
                    }
                    // Barrel connector plate
                    ctx.fillStyle = '#446688'; ctx.fillRect(2, -4.5, 3, 9);
                    // Targeting optic
                    ctx.fillStyle = '#aaddff'; ctx.beginPath(); ctx.arc(1, -6, 1.5, 0, Math.PI*2); ctx.fill();
                    ctx.restore();

                } else if (def.id === 'goo') {
                    // Pressurized chemical tank with spray nozzle
                    ctx.save(); ctx.translate(tx, ty); ctx.rotate(a);
                    // Pressure tank
                    ctx.fillStyle = '#336633';
                    ctx.beginPath(); ctx.ellipse(-2, 0, 5, 6, 0, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#224422'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.ellipse(-2, 0, 5, 6, 0, 0, Math.PI*2); ctx.stroke();
                    // Tank straps
                    ctx.strokeStyle = '#448844'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(-5, -2); ctx.lineTo(1, -2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-5, 2); ctx.lineTo(1, 2); ctx.stroke();
                    // Nozzle pipe
                    ctx.strokeStyle = '#558855'; ctx.lineWidth = 3; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(3, 0); ctx.lineTo(11, 0); ctx.stroke();
                    // Spray head
                    ctx.fillStyle = '#88ee88';
                    ctx.beginPath(); ctx.arc(12, 0, 3, -0.7, 0.7); ctx.lineTo(10, 0); ctx.closePath(); ctx.fill();
                    // Drip
                    ctx.fillStyle = '#66cc66'; ctx.beginPath(); ctx.arc(13, 2, 1.5, 0, Math.PI*2); ctx.fill();
                    ctx.restore();

                } else if (def.id === 'chain') {
                    // Heavy machine gun with ammo belt
                    ctx.save(); ctx.translate(tx, ty); ctx.rotate(a);
                    // Gun body / receiver
                    ctx.fillStyle = '#998833'; ctx.fillRect(-3, -3, 17, 6);
                    ctx.strokeStyle = '#776622'; ctx.lineWidth = 0.5; ctx.strokeRect(-3, -3, 17, 6);
                    // Barrel with cooling jacket
                    ctx.fillStyle = '#bbaa44'; ctx.fillRect(8, -2, 10, 4);
                    // Cooling fins
                    ctx.strokeStyle = '#887722'; ctx.lineWidth = 0.5;
                    for (let i = 0; i < 4; i++) { const fx = 10+i*2; ctx.beginPath(); ctx.moveTo(fx, -2.5); ctx.lineTo(fx, 2.5); ctx.stroke(); }
                    // Muzzle
                    ctx.fillStyle = '#443300'; ctx.fillRect(17, -1.5, 2, 3);
                    // Ammo box
                    ctx.fillStyle = '#776622'; ctx.fillRect(-2, 3, 7, 5);
                    ctx.strokeStyle = '#554400'; ctx.lineWidth = 0.5; ctx.strokeRect(-2, 3, 7, 5);
                    // Ammo belt
                    ctx.fillStyle = '#ccaa44';
                    for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.arc(i*2.5, 4, 1, 0, Math.PI*2); ctx.fill(); }
                    ctx.restore();

                } else if (def.id === 'gauss') {
                    // Electromagnetic accelerator rails
                    ctx.save(); ctx.translate(tx, ty); ctx.rotate(a);
                    // Housing
                    ctx.fillStyle = '#884466'; ctx.fillRect(-2, -2, 8, 4);
                    // Dual magnetic rails
                    ctx.fillStyle = '#cc6688';
                    ctx.fillRect(4, -4.5, 14, 2); ctx.fillRect(4, 2.5, 14, 2);
                    ctx.strokeStyle = '#aa4466'; ctx.lineWidth = 0.5;
                    ctx.strokeRect(4, -4.5, 14, 2); ctx.strokeRect(4, 2.5, 14, 2);
                    // Capacitor rings
                    ctx.strokeStyle = '#ffaacc'; ctx.lineWidth = 1;
                    for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.moveTo(7+i*3.5, -4.5); ctx.lineTo(7+i*3.5, 4.5); ctx.stroke(); }
                    // Energy channel between rails
                    const eg = ctx.createLinearGradient(6, 0, 18, 0);
                    eg.addColorStop(0, 'rgba(255,150,200,0.1)'); eg.addColorStop(1, 'rgba(255,200,230,0.5)');
                    ctx.fillStyle = eg; ctx.fillRect(6, -2.5, 12, 5);
                    // Muzzle glow
                    ctx.fillStyle = '#ffccee'; ctx.beginPath(); ctx.arc(18, 0, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = 'rgba(255,200,230,0.3)'; ctx.beginPath(); ctx.arc(18, 0, 4, 0, Math.PI*2); ctx.fill();
                    ctx.restore();

                } else if (def.id === 'oil') {
                    // Oil drum with spray nozzle
                    ctx.save(); ctx.translate(tx, ty); ctx.rotate(a);
                    // Oil drum
                    ctx.fillStyle = '#554433';
                    ctx.beginPath(); ctx.ellipse(-1, 0, 5, 6, 0, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#332211'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.ellipse(-1, 0, 5, 6, 0, 0, Math.PI*2); ctx.stroke();
                    // Drum bands
                    ctx.strokeStyle = '#776655'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(-4, -3); ctx.lineTo(2, -3); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-4, 3); ctx.lineTo(2, 3); ctx.stroke();
                    // Spray pipe
                    ctx.strokeStyle = '#665544'; ctx.lineWidth = 2.5;
                    ctx.beginPath(); ctx.moveTo(3, 0); ctx.lineTo(10, 0); ctx.stroke();
                    // Fan-shaped spray head
                    ctx.fillStyle = '#887766';
                    ctx.beginPath(); ctx.arc(11, 0, 5, -0.7, 0.7); ctx.lineTo(9, 0); ctx.closePath(); ctx.fill();
                    // Oil drops
                    ctx.fillStyle = '#443322';
                    ctx.beginPath(); ctx.arc(13, -2, 1, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(14, 1, 1.2, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }
            }
        }
    },

    renderEnemies() {
        for (const e of Game.enemies) {
            if (!e.alive) continue;

            ctx.save();
            ctx.translate(e.x, e.y);

            // Shadow for flying
            if (e.flying) {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(3, 5, e.size * 0.8, e.size * 0.4, 0, 0, Math.PI*2);
                ctx.fill();
            }

            // Body
            const yOff = e.flying ? -6 : 0;
            let baseColor = e.color;
            if (e.frozen > 0) baseColor = '#aef';
            if (e.nullified > 0) baseColor = '#faf';
            const rgb = hexToRgb(baseColor);

            if (e.type === 'drone') {
                // Quadcopter drone (flying)
                const s = e.size;
                // Arms
                ctx.strokeStyle = `rgba(${rgb},0.8)`; ctx.lineWidth = 1.5;
                for (let i = 0; i < 4; i++) {
                    const da = Math.PI/4 + i*Math.PI/2;
                    ctx.beginPath(); ctx.moveTo(0, yOff);
                    ctx.lineTo(Math.cos(da)*s*0.9, yOff + Math.sin(da)*s*0.9);
                    ctx.stroke();
                }
                // Rotor discs
                const rt = (Date.now()/30) % (Math.PI*2);
                for (let i = 0; i < 4; i++) {
                    const da = Math.PI/4 + i*Math.PI/2;
                    const rx = Math.cos(da)*s*0.9, ry = yOff + Math.sin(da)*s*0.9;
                    ctx.fillStyle = 'rgba(255,255,255,0.08)';
                    ctx.beginPath(); ctx.arc(rx, ry, s*0.35, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.arc(rx, ry, s*0.35, 0, Math.PI*2); ctx.stroke();
                }
                // Central body
                ctx.fillStyle = baseColor;
                ctx.beginPath(); ctx.arc(0, yOff, s*0.35, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(0, yOff, s*0.35, 0, Math.PI*2); ctx.stroke();
                // Camera sensor
                ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(0, yOff, s*0.15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#f44'; ctx.beginPath(); ctx.arc(0, yOff, 1, 0, Math.PI*2); ctx.fill();

            } else if (e.type === 'airship') {
                // Military helicopter/gunship (flying)
                const s = e.size;
                ctx.save(); ctx.rotate(e.heading || 0);
                // Fuselage
                ctx.fillStyle = baseColor;
                ctx.beginPath(); ctx.ellipse(0, yOff, s*1.1, s*0.5, 0, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.ellipse(0, yOff, s*1.1, s*0.5, 0, 0, Math.PI*2); ctx.stroke();
                // Cockpit windshield
                ctx.fillStyle = 'rgba(200,220,255,0.5)';
                ctx.beginPath(); ctx.ellipse(s*0.5, yOff, s*0.3, s*0.25, 0, 0, Math.PI*2); ctx.fill();
                // Tail boom
                ctx.fillStyle = `rgba(${rgb},0.7)`;
                ctx.fillRect(-s*1.2, yOff-s*0.15, s*0.4, s*0.3);
                // Tail rotor
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(-s*1.2, yOff, s*0.25, 0, Math.PI*2); ctx.stroke();
                // Main rotor disc
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                ctx.beginPath(); ctx.arc(0, yOff, s*1.0, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(0, yOff, s*1.0, 0, Math.PI*2); ctx.stroke();
                // Animated rotor blades
                const rr = (Date.now()/25) % (Math.PI*2);
                ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
                for (let i = 0; i < 2; i++) {
                    const ba = rr + i*Math.PI;
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(ba)*-s*0.9, yOff+Math.sin(ba)*-s*0.9);
                    ctx.lineTo(Math.cos(ba)*s*0.9, yOff+Math.sin(ba)*s*0.9);
                    ctx.stroke();
                }
                // Weapon pods
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(s*0.2, yOff+s*0.35, s*0.4, s*0.15);
                ctx.fillRect(s*0.2, yOff-s*0.5, s*0.4, s*0.15);
                ctx.restore();

            } else if (e.type === 'mothership') {
                // Large carrier command vessel (flying) - diamond/kite hull
                const s = e.size;
                ctx.save(); ctx.rotate(e.heading || 0);
                // Main hull - elongated diamond/kite shape
                ctx.fillStyle = baseColor;
                ctx.beginPath();
                ctx.moveTo(s*1.3, yOff);          // nose
                ctx.lineTo(s*0.1, yOff-s*0.9);    // top wing
                ctx.lineTo(-s*1.0, yOff-s*0.4);   // rear top
                ctx.lineTo(-s*1.2, yOff);          // tail
                ctx.lineTo(-s*1.0, yOff+s*0.4);   // rear bottom
                ctx.lineTo(s*0.1, yOff+s*0.9);    // bottom wing
                ctx.closePath(); ctx.fill();
                // Hull outline
                ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1.5;
                ctx.stroke();
                // Armor panel seams
                ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 0.8;
                ctx.beginPath(); ctx.moveTo(s*1.3, yOff); ctx.lineTo(-s*1.2, yOff); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(s*0.1, yOff-s*0.9); ctx.lineTo(-s*0.2, yOff); ctx.lineTo(s*0.1, yOff+s*0.9); ctx.stroke();
                // Wing engine pods
                ctx.fillStyle = `rgba(${rgb},0.6)`;
                ctx.beginPath(); ctx.ellipse(s*0.1, yOff-s*0.7, s*0.25, s*0.12, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(s*0.1, yOff+s*0.7, s*0.25, s*0.12, 0, 0, Math.PI*2); ctx.fill();
                // Engine glow on pods
                ctx.fillStyle = 'rgba(200,150,255,0.4)';
                ctx.beginPath(); ctx.arc(-s*0.1, yOff-s*0.7, s*0.1, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(-s*0.1, yOff+s*0.7, s*0.1, 0, Math.PI*2); ctx.fill();
                // Rear engine glow
                ctx.fillStyle = 'rgba(200,150,255,0.5)';
                ctx.beginPath(); ctx.ellipse(-s*1.3, yOff, s*0.2, s*0.15, 0, 0, Math.PI*2); ctx.fill();
                // Central command bridge
                ctx.fillStyle = `rgba(${rgb},0.9)`;
                ctx.beginPath(); ctx.ellipse(s*0.2, yOff, s*0.35, s*0.25, 0, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.8;
                ctx.beginPath(); ctx.ellipse(s*0.2, yOff, s*0.35, s*0.25, 0, 0, Math.PI*2); ctx.stroke();
                // Bridge windows
                ctx.fillStyle = 'rgba(200,220,255,0.6)';
                ctx.beginPath(); ctx.ellipse(s*0.35, yOff, s*0.12, s*0.15, 0, 0, Math.PI*2); ctx.fill();
                // Animated running lights along wings
                const mlt = Date.now()/200;
                for (let i = 0; i < 6; i++) {
                    const t = i / 5;
                    const bright = (Math.sin(t*6 + mlt) + 1) * 0.5;
                    ctx.fillStyle = `rgba(255,200,255,${0.3+bright*0.5})`;
                    const lx = s*1.1 - t*s*2.3;
                    ctx.beginPath(); ctx.arc(lx, yOff-s*0.3-t*s*0.1, 1.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(lx, yOff+s*0.3+t*s*0.1, 1.5, 0, Math.PI*2); ctx.fill();
                }
                // Nose sensor dome
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(s*1.1, yOff, s*0.08, 0, Math.PI*2); ctx.fill();
                ctx.restore();

            } else if (e.type === 'tank' || e.type === 'fortress') {
                // Tank / heavy assault vehicle (top-down)
                const s = e.size;
                ctx.save(); ctx.rotate(e.heading || 0);
                // Track assemblies
                ctx.fillStyle = '#333';
                ctx.fillRect(-s*0.9, -s-1, s*1.8, 3);
                ctx.fillRect(-s*0.9, s-2, s*1.8, 3);
                // Track link detail
                ctx.strokeStyle = '#444'; ctx.lineWidth = 0.5;
                for (let i = 0; i < Math.floor(s*0.6); i++) {
                    const lx = -s*0.8 + i*3;
                    ctx.beginPath(); ctx.moveTo(lx, -s-1); ctx.lineTo(lx, -s+2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(lx, s-2); ctx.lineTo(lx, s+1); ctx.stroke();
                }
                // Hull body
                ctx.fillStyle = baseColor;
                const hullW = e.type === 'fortress' ? s*1.9 : s*1.7;
                const hullH = e.type === 'fortress' ? s*1.6 : s*1.5;
                ctx.fillRect(-hullW/2, -hullH/2, hullW, hullH);
                // Hull outline
                ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.5;
                ctx.strokeRect(-hullW/2, -hullH/2, hullW, hullH);
                // Front armor slope highlight
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.beginPath();
                ctx.moveTo(hullW/2, -hullH/2); ctx.lineTo(hullW/2-s*0.3, -hullH/2+s*0.3);
                ctx.lineTo(hullW/2-s*0.3, hullH/2-s*0.3); ctx.lineTo(hullW/2, hullH/2);
                ctx.closePath(); ctx.fill();
                // Engine deck (rear)
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(-hullW/2, -hullH/2, s*0.5, hullH);
                // Engine grille lines
                ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 0.5;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath(); ctx.moveTo(-hullW/2+2, -hullH/2+3+i*s*0.3);
                    ctx.lineTo(-hullW/2+s*0.4, -hullH/2+3+i*s*0.3); ctx.stroke();
                }
                // Turret dome
                const tr = e.type === 'fortress' ? s*0.45 : s*0.4;
                ctx.fillStyle = `rgba(${rgb},0.85)`;
                ctx.beginPath(); ctx.arc(s*0.1, 0, tr, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.8;
                ctx.beginPath(); ctx.arc(s*0.1, 0, tr, 0, Math.PI*2); ctx.stroke();
                // Main gun barrel
                const barrelLen = e.type === 'fortress' ? s*1.2 : s;
                const barrelW = e.type === 'fortress' ? 3.5 : 2.5;
                ctx.fillStyle = '#555';
                ctx.fillRect(s*0.1+tr*0.5, -barrelW/2, barrelLen, barrelW);
                ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5;
                ctx.strokeRect(s*0.1+tr*0.5, -barrelW/2, barrelLen, barrelW);
                // Commander hatch
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath();
                ctx.arc(s*0.1-tr*0.2, 0, tr*0.3, 0, Math.PI*2); ctx.fill();
                if (e.type === 'fortress') {
                    // Secondary turret
                    ctx.fillStyle = 'rgba(0,0,0,0.25)';
                    ctx.beginPath(); ctx.arc(-s*0.3, 0, s*0.2, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#444'; ctx.fillRect(-s*0.3, -1, s*0.5, 2);
                    // Extra armor plates
                    ctx.fillStyle = 'rgba(255,255,255,0.08)';
                    ctx.fillRect(-hullW/2+1, -hullH/2+1, s*0.3, s*0.3);
                    ctx.fillRect(-hullW/2+1, hullH/2-s*0.3-1, s*0.3, s*0.3);
                }
                ctx.restore();

            } else if (e.type === 'speeder') {
                // Sleek attack craft with engines
                const s = e.size;
                ctx.save(); ctx.rotate(e.heading || 0);
                // Engine exhaust glow
                ctx.fillStyle = 'rgba(255,200,100,0.3)';
                ctx.beginPath(); ctx.ellipse(-s*1.2, 0, s*0.4, s*0.2, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,200,0.5)';
                ctx.beginPath(); ctx.ellipse(-s*0.9, 0, s*0.15, s*0.1, 0, 0, Math.PI*2); ctx.fill();
                // Aerodynamic body
                ctx.fillStyle = baseColor;
                ctx.beginPath();
                ctx.moveTo(s*1.1, 0); ctx.lineTo(s*0.2, -s*0.6);
                ctx.lineTo(-s*0.8, -s*0.5); ctx.lineTo(-s*0.7, 0);
                ctx.lineTo(-s*0.8, s*0.5); ctx.lineTo(s*0.2, s*0.6);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.stroke();
                // Cockpit canopy
                ctx.fillStyle = 'rgba(200,230,255,0.5)';
                ctx.beginPath();
                ctx.moveTo(s*0.7, 0); ctx.lineTo(s*0.2, -s*0.25);
                ctx.lineTo(0, -s*0.2); ctx.lineTo(0, s*0.2);
                ctx.lineTo(s*0.2, s*0.25); ctx.closePath(); ctx.fill();
                // Engine nacelles
                ctx.fillStyle = `rgba(${rgb},0.6)`;
                ctx.fillRect(-s*0.7, -s*0.55, s*0.4, s*0.2);
                ctx.fillRect(-s*0.7, s*0.35, s*0.4, s*0.2);
                // Tail fins
                ctx.strokeStyle = baseColor; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(-s*0.6, -s*0.5); ctx.lineTo(-s*0.8, -s*0.8); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-s*0.6, s*0.5); ctx.lineTo(-s*0.8, s*0.8); ctx.stroke();
                ctx.restore();

            } else if (e.type === 'healer') {
                // Armored medical APC (top-down)
                const s = e.size;
                ctx.save(); ctx.rotate(e.heading || 0);
                // Wheels / track pads
                ctx.fillStyle = '#333';
                ctx.fillRect(-s*0.7, -s*0.75, s*0.35, s*0.2);
                ctx.fillRect(-s*0.7, s*0.55, s*0.35, s*0.2);
                ctx.fillRect(s*0.35, -s*0.75, s*0.35, s*0.2);
                ctx.fillRect(s*0.35, s*0.55, s*0.35, s*0.2);
                // Main hull - rounded rectangle
                ctx.fillStyle = baseColor;
                const hw = s*1.6, hh = s*1.2;
                ctx.beginPath();
                ctx.roundRect(-hw/2, -hh/2, hw, hh, s*0.2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(-hw/2, -hh/2, hw, hh, s*0.2);
                ctx.stroke();
                // White roof with red cross
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.beginPath();
                ctx.roundRect(-s*0.35, -s*0.3, s*0.7, s*0.6, s*0.08);
                ctx.fill();
                // Red medical cross on white roof
                ctx.fillStyle = '#dd2222';
                const cw = s*0.12, ch = s*0.4;
                ctx.fillRect(-cw, -ch/2, cw*2, ch);
                ctx.fillRect(-ch/2, -cw, ch, cw*2);
                // Front windshield
                ctx.fillStyle = 'rgba(180,210,240,0.5)';
                ctx.fillRect(s*0.45, -s*0.35, s*0.25, s*0.7);
                // Rear door seam
                ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 0.8;
                ctx.beginPath(); ctx.moveTo(-hw/2, -s*0.15); ctx.lineTo(-hw/2-s*0.05, -s*0.15); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-hw/2, s*0.15); ctx.lineTo(-hw/2-s*0.05, s*0.15); ctx.stroke();
                // Blinking roof light
                const blink2 = Math.sin(Date.now()/200) > 0;
                ctx.fillStyle = blink2 ? 'rgba(255,50,50,0.8)' : 'rgba(255,50,50,0.2)';
                ctx.beginPath(); ctx.arc(s*0.55, -s*0.45, 2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = !blink2 ? 'rgba(50,100,255,0.8)' : 'rgba(50,100,255,0.2)';
                ctx.beginPath(); ctx.arc(s*0.55, s*0.45, 2, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                // Animated healing pulse aura
                const hp2 = (Date.now()/600) % 1;
                ctx.strokeStyle = `rgba(100,255,100,${0.4*(1-hp2)})`;
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(0, yOff, s*(1+hp2*0.5), 0, Math.PI*2); ctx.stroke();

            } else if (e.type === 'shielded') {
                // Hexagonal armored transport
                const s = e.size;
                // Hex hull
                ctx.fillStyle = baseColor;
                ctx.beginPath();
                for (let h = 0; h < 6; h++) {
                    const ha = Math.PI/3*h - Math.PI/6;
                    const hx = Math.cos(ha)*s, hy = Math.sin(ha)*s + yOff;
                    h === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
                }
                ctx.closePath(); ctx.fill();
                // Armor panel seams
                ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.8;
                for (let h = 0; h < 6; h++) {
                    const ha = Math.PI/3*h - Math.PI/6;
                    ctx.beginPath(); ctx.moveTo(0, yOff);
                    ctx.lineTo(Math.cos(ha)*s, Math.sin(ha)*s+yOff);
                    ctx.stroke();
                }
                // Inner reinforced core
                ctx.fillStyle = `rgba(${rgb},0.5)`;
                ctx.beginPath();
                for (let h = 0; h < 6; h++) {
                    const ha = Math.PI/3*h - Math.PI/6;
                    const hx = Math.cos(ha)*s*0.5, hy = Math.sin(ha)*s*0.5 + yOff;
                    h === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
                }
                ctx.closePath(); ctx.fill();
                // Shield generator core
                ctx.fillStyle = 'rgba(100,200,255,0.4)';
                ctx.beginPath(); ctx.arc(0, yOff, s*0.25, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(0, yOff, s*0.1, 0, Math.PI*2); ctx.fill();
                // Hull outline
                ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1.5;
                ctx.beginPath();
                for (let h = 0; h < 6; h++) {
                    const ha = Math.PI/3*h - Math.PI/6;
                    h === 0 ? ctx.moveTo(Math.cos(ha)*s, Math.sin(ha)*s+yOff)
                            : ctx.lineTo(Math.cos(ha)*s, Math.sin(ha)*s+yOff);
                }
                ctx.closePath(); ctx.stroke();
                // Rivet details
                for (let h = 0; h < 6; h++) {
                    const ha = Math.PI/3*h + Math.PI/6 - Math.PI/6;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath();
                    ctx.arc(Math.cos(ha)*s*0.7, Math.sin(ha)*s*0.7+yOff, 1, 0, Math.PI*2); ctx.fill();
                }

            } else if (e.type === 'jammer') {
                // Electronic warfare vehicle with antenna
                const s = e.size;
                ctx.save(); ctx.rotate(e.heading || 0);
                // Boxy vehicle hull
                ctx.fillStyle = baseColor;
                ctx.fillRect(-s*0.8, -s*0.6, s*1.6, s*1.2);
                ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
                ctx.strokeRect(-s*0.8, -s*0.6, s*1.6, s*1.2);
                // Warning stripe pattern
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                for (let i = 0; i < 4; i++) {
                    ctx.fillRect(-s*0.7+i*s*0.4, -s*0.6, s*0.15, s*1.2);
                }
                // Equipment panel
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(-s*0.5, -s*0.4, s, s*0.8);
                // Antenna mast
                ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -s*0.9); ctx.stroke();
                // Rotating radar dish
                const ja = (Date.now()/500) % (Math.PI*2);
                ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(Math.cos(ja)*s*0.5, -s*0.9+Math.sin(ja)*s*0.2);
                ctx.lineTo(0, -s*0.9);
                ctx.lineTo(Math.cos(ja+Math.PI)*s*0.5, -s*0.9+Math.sin(ja+Math.PI)*s*0.2);
                ctx.stroke();
                // ECM antenna tips
                ctx.fillStyle = '#ff5555';
                ctx.beginPath(); ctx.arc(Math.cos(ja)*s*0.5, -s*0.9+Math.sin(ja)*s*0.2, 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(Math.cos(ja+Math.PI)*s*0.5, -s*0.9+Math.sin(ja+Math.PI)*s*0.2, 1.5, 0, Math.PI*2); ctx.fill();
                // Blinking warning light
                const blink = Math.sin(Date.now()/150) > 0;
                if (blink) {
                    ctx.fillStyle = 'rgba(255,80,80,0.6)';
                    ctx.beginPath(); ctx.arc(0, -s*0.9, 3, 0, Math.PI*2); ctx.fill();
                }
                ctx.fillStyle = '#f55'; ctx.beginPath(); ctx.arc(0, -s*0.9, 1.5, 0, Math.PI*2); ctx.fill();
                ctx.restore();

            } else {
                // Soldier - infantry top-down view
                const s = e.size;
                ctx.save(); ctx.rotate(e.heading || 0);
                // Legs/boots
                ctx.fillStyle = `rgba(${rgb},0.5)`;
                ctx.fillRect(-s*0.2, s*0.3, s*0.15, s*0.4);
                ctx.fillRect(s*0.05, s*0.3, s*0.15, s*0.4);
                // Torso
                ctx.fillStyle = baseColor;
                ctx.fillRect(-s*0.35, -s*0.3, s*0.7, s*0.7);
                // Shoulders/arms
                ctx.fillStyle = `rgba(${rgb},0.8)`;
                ctx.fillRect(-s*0.5, -s*0.15, s*0.2, s*0.4);
                ctx.fillRect(s*0.3, -s*0.15, s*0.2, s*0.4);
                // Backpack
                ctx.fillStyle = `rgba(${rgb},0.5)`;
                ctx.fillRect(-s*0.25, -s*0.6, s*0.5, s*0.35);
                // Helmet (round, viewed from above)
                const hg = ctx.createRadialGradient(-s*0.05, -s*0.15, 0, 0, 0, s*0.4);
                hg.addColorStop(0, `rgba(${rgb},1)`); hg.addColorStop(1, `rgba(${rgb},0.6)`);
                ctx.fillStyle = hg;
                ctx.beginPath(); ctx.arc(0, 0, s*0.4, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.8;
                ctx.beginPath(); ctx.arc(0, 0, s*0.4, 0, Math.PI*2); ctx.stroke();
                // Helmet shine
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.beginPath(); ctx.arc(-s*0.1, -s*0.1, s*0.15, 0, Math.PI*2); ctx.fill();
                // Rifle
                ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(s*0.4, -s*0.1); ctx.lineTo(s*0.9, -s*0.1); ctx.stroke();
                ctx.restore();
            }

            // Shield indicator
            if (e.shield > 0 && e.nullified <= 0) {
                ctx.beginPath();
                ctx.arc(0, yOff, e.size + 3, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(100,200,255,0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Autorepair indicator
            if (e.autorepair > 0 && e.nullified <= 0) {
                ctx.fillStyle = '#5f5';
                ctx.font = '8px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('+', 0, yOff - e.size - 4);
            }

            // Jammer indicator
            if (e.jammer) {
                ctx.beginPath();
                ctx.arc(0, yOff, e.jamRange || 80, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(255,100,100,0.15)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4,4]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Health bar
            const hpPct = e.hp / e.maxHp;
            if (hpPct < 1) {
                const bw = e.size * 2;
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(-bw/2, yOff - e.size - 6, bw, 3);
                ctx.fillStyle = hpPct > 0.5 ? '#5f5' : hpPct > 0.25 ? '#ff5' : '#f55';
                ctx.fillRect(-bw/2, yOff - e.size - 6, bw * hpPct, 3);
            }

            // Frozen timer
            if (e.frozen > 0) {
                ctx.fillStyle = 'rgba(170,220,255,0.3)';
                ctx.beginPath();
                ctx.arc(0, yOff, e.size + 5, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.restore();
        }
    },

    renderProjectiles() {
        for (const p of Game.projectiles) {
            const sz = p.size || 5;
            const rgb = hexToRgb(p.color || '#fff');

            // Glow
            ctx.beginPath();
            ctx.arc(p.x, p.y, sz + 4, 0, Math.PI*2);
            ctx.fillStyle = `rgba(${rgb}, 0.25)`;
            ctx.fill();

            // Core
            ctx.fillStyle = p.color || '#fff';
            ctx.beginPath();
            ctx.arc(p.x, p.y, sz, 0, Math.PI*2);
            ctx.fill();

            // Bright center
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(p.x, p.y, sz * 0.4, 0, Math.PI*2);
            ctx.fill();

            // Trail
            for (let t = 1; t <= 3; t++) {
                ctx.fillStyle = `rgba(${rgb}, ${0.3 - t * 0.08})`;
                ctx.beginPath();
                ctx.arc(p.x - p.vx * t, p.y - p.vy * t, sz * (1 - t * 0.2), 0, Math.PI*2);
                ctx.fill();
            }
        }
    },

    renderEffects() {
        for (const fx of Game.effects) {
            if (fx.type === 'text') {
                ctx.globalAlpha = fx.life / 60;
                ctx.fillStyle = fx.color;
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(fx.text, fx.x, fx.y - (60 - fx.life) * 0.5);
                ctx.globalAlpha = 1;
            }
            if (fx.type === 'ring') {
                const pct = 1 - fx.life / 20;
                ctx.beginPath();
                ctx.arc(fx.x, fx.y, fx.maxRadius * pct, 0, Math.PI*2);
                ctx.strokeStyle = fx.color;
                ctx.globalAlpha = fx.life / 20;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
            if (fx.type === 'nuke_flash') {
                // Brief white flash over the whole screen
                const intensity = fx.life / 12;
                ctx.fillStyle = `rgba(255,255,255,${intensity * 0.7})`;
                ctx.fillRect(0, 0, CW, CH);
            }
            if (fx.type === 'explosion') {
                const pct = 1 - fx.life / 40;
                ctx.beginPath();
                ctx.arc(fx.x, fx.y, fx.maxRadius * pct, 0, Math.PI*2);
                ctx.fillStyle = fx.color;
                ctx.globalAlpha = fx.life / 40 * 0.6;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            if (fx.type === 'freeze_ring') {
                const pct = 1 - fx.life / 30;
                ctx.beginPath();
                ctx.arc(fx.x, fx.y, fx.maxRadius * pct, 0, Math.PI*2);
                ctx.strokeStyle = '#aef';
                ctx.globalAlpha = fx.life / 30;
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.fillStyle = 'rgba(170,220,255,0.1)';
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            if (fx.type === 'tesla') {
                ctx.beginPath();
                ctx.arc(fx.x, fx.y, fx.radius, 0, Math.PI*2);
                ctx.strokeStyle = '#59f';
                ctx.globalAlpha = fx.life / 8 * 0.5;
                ctx.lineWidth = 2;
                ctx.stroke();
                // Lightning bolts
                for (let i = 0; i < 4; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const r = fx.radius * Math.random();
                    ctx.beginPath();
                    ctx.moveTo(fx.x, fx.y);
                    const mx = fx.x + Math.cos(a) * r * 0.5 + rand(-10,10);
                    const my = fx.y + Math.sin(a) * r * 0.5 + rand(-10,10);
                    ctx.lineTo(mx, my);
                    ctx.lineTo(fx.x + Math.cos(a) * r, fx.y + Math.sin(a) * r);
                    ctx.strokeStyle = '#8bf';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
            }
            if (fx.type === 'oil') {
                ctx.beginPath();
                ctx.arc(fx.x, fx.y, fx.radius, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(80,60,30,0.4)';
                ctx.globalAlpha = fx.life / 15;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            if (fx.type === 'line') {
                ctx.beginPath();
                ctx.moveTo(fx.x1, fx.y1);
                ctx.lineTo(fx.x2, fx.y2);
                ctx.strokeStyle = fx.color;
                ctx.globalAlpha = fx.life / 6;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
            if (fx.type === 'muzzle') {
                const a = fx.life / 5;
                ctx.beginPath();
                ctx.arc(fx.x, fx.y, 8 * a, 0, Math.PI*2);
                ctx.fillStyle = '#fff';
                ctx.globalAlpha = a * 0.8;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(fx.x, fx.y, 12 * a, 0, Math.PI*2);
                ctx.fillStyle = fx.color;
                ctx.globalAlpha = a * 0.4;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            if (fx.type === 'hit') {
                ctx.fillStyle = fx.color;
                ctx.globalAlpha = fx.life / 6;
                ctx.beginPath();
                ctx.arc(fx.x, fx.y, 5 * (1 - fx.life/6), 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            if (fx.type === 'particle') {
                fx.x += fx.vx;
                fx.y += fx.vy;
                fx.vy += 0.1;
                ctx.fillStyle = fx.color;
                ctx.globalAlpha = fx.life / 25;
                ctx.beginPath();
                ctx.arc(fx.x, fx.y, fx.size, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            if (fx.type === 'icbm') {
                // ICBM flies in an arc from center-bottom to target
                const t = fx.progress;
                // Quadratic bezier: start -> control point (high arc) -> target
                const cpX = (fx.startX + fx.targetX) / 2;
                const cpY = Math.min(fx.startY, fx.targetY) - 80; // shallow arc
                const ix = (1-t)*(1-t)*fx.startX + 2*(1-t)*t*cpX + t*t*fx.targetX;
                const iy = (1-t)*(1-t)*fx.startY + 2*(1-t)*t*cpY + t*t*fx.targetY;
                // Compute heading from tangent
                const dtx = 2*(1-t)*(cpX - fx.startX) + 2*t*(fx.targetX - cpX);
                const dty = 2*(1-t)*(cpY - fx.startY) + 2*t*(fx.targetY - cpY);
                const heading = Math.atan2(dty, dtx);

                // Smoke trail
                for (let s = 1; s <= 5; s++) {
                    const st = Math.max(0, t - s * 0.015);
                    const sx = (1-st)*(1-st)*fx.startX + 2*(1-st)*st*cpX + st*st*fx.targetX;
                    const sy = (1-st)*(1-st)*fx.startY + 2*(1-st)*st*cpY + st*st*fx.targetY;
                    ctx.fillStyle = `rgba(200,200,200,${0.3 - s * 0.05})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 3 + s, 0, Math.PI*2);
                    ctx.fill();
                }

                // Missile body
                ctx.save();
                ctx.translate(ix, iy);
                ctx.rotate(heading);
                // Body
                ctx.fillStyle = '#ddd';
                ctx.beginPath();
                ctx.moveTo(12, 0);
                ctx.lineTo(-8, -4);
                ctx.lineTo(-8, 4);
                ctx.closePath();
                ctx.fill();
                // Nosecone
                ctx.fillStyle = '#f44';
                ctx.beginPath();
                ctx.moveTo(12, 0);
                ctx.lineTo(6, -3);
                ctx.lineTo(6, 3);
                ctx.closePath();
                ctx.fill();
                // Fins
                ctx.fillStyle = '#999';
                ctx.beginPath();
                ctx.moveTo(-8, -4); ctx.lineTo(-12, -8); ctx.lineTo(-6, -4);
                ctx.closePath(); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-8, 4); ctx.lineTo(-12, 8); ctx.lineTo(-6, 4);
                ctx.closePath(); ctx.fill();
                // Flame
                ctx.fillStyle = '#f84';
                ctx.beginPath();
                ctx.moveTo(-8, -2); ctx.lineTo(-14 - Math.random()*4, 0); ctx.lineTo(-8, 2);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.moveTo(-8, -1); ctx.lineTo(-11 - Math.random()*3, 0); ctx.lineTo(-8, 1);
                ctx.closePath(); ctx.fill();
                ctx.restore();

                // Target reticle
                ctx.strokeStyle = 'rgba(255,100,50,0.4)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4,4]);
                ctx.beginPath();
                ctx.arc(fx.targetX, fx.targetY, fx.radius, 0, Math.PI*2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }
    },

    renderPlacement() {
        if (!Game.selectedTowerDef || Game.state !== 'playing') return;
        const mx = Game.mouse.x;
        const my = Game.mouse.y;
        const g = snapToGrid(mx, my);
        const def = Game.selectedTowerDef;
        const gw = def.gridW || 1;
        const gh = def.gridH || 1;
        const can = Game.canPlace(mx, my, def) && Game.money >= def.cost;

        // Show multi-cell footprint highlight
        ctx.fillStyle = can ? 'rgba(100,255,100,0.3)' : 'rgba(255,100,100,0.3)';
        ctx.fillRect(g.col * GRID_SIZE, g.row * GRID_SIZE, GRID_SIZE * gw, GRID_SIZE * gh);
        ctx.strokeStyle = can ? '#5f5' : '#f55';
        ctx.lineWidth = 2;
        ctx.strokeRect(g.col * GRID_SIZE, g.row * GRID_SIZE, GRID_SIZE * gw, GRID_SIZE * gh);

        // Range preview (centered on footprint)
        const cx = g.col * GRID_SIZE + (gw * GRID_SIZE) / 2;
        const cy = g.row * GRID_SIZE + (gh * GRID_SIZE) / 2;
        if (def.range > 0) {
            ctx.beginPath();
            ctx.arc(cx, cy, def.range, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    },

    renderAbilityPreview() {
        if (!Game.activeAbility || Game.state !== 'playing') return;
        const mx = Game.mouse.x;
        const my = Game.mouse.y;

        if (Game.activeAbility === 'nuke') {
            ctx.beginPath();
            ctx.arc(mx, my, 120, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(255,136,68,0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,136,68,0.1)';
            ctx.fill();
            ctx.fillStyle = '#f84';
            ctx.font = '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('\uD83D\uDE80', mx, my + 6);
            // Show trajectory line from center bottom
            ctx.setLineDash([4, 6]);
            ctx.strokeStyle = 'rgba(255,136,68,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(CW/2, CH);
            ctx.lineTo(mx, my);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        if (Game.activeAbility === 'wall') {
            const hs = GRID_SIZE / 2;
            ctx.fillStyle = Game.isOnPath(mx, my) && !Game.isOnWall(mx, my)
                ? 'rgba(136,136,136,0.5)' : 'rgba(255,100,100,0.3)';
            ctx.fillRect(mx - hs, my - hs, GRID_SIZE, GRID_SIZE);
        }
        if (Game.activeAbility === 'freeze') {
            ctx.beginPath();
            ctx.arc(mx, my, 120, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(170,220,255,0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = 'rgba(170,220,255,0.1)';
            ctx.fill();
            ctx.fillStyle = '#aef';
            ctx.font = '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('\u2744', mx, my + 6);
        }
    },

    // ============================================================
    // UI
    // ============================================================
    _lastUIMoney: -1,

    updateUI() {
        document.getElementById('moneyVal').textContent = Game.money;
        document.getElementById('waveVal').textContent = Game.wave + '/' + Game.maxWaves;
        document.getElementById('livesVal').textContent = Game.lives;
        document.getElementById('scoreVal').textContent = Game.score.toLocaleString();

        // Update tower cost colors when money changes (without full DOM rebuild)
        if (Game.money !== Game._lastUIMoney) {
            Game._lastUIMoney = Game.money;
            document.querySelectorAll('.tower-item').forEach((el, i) => {
                const tab = TOWER_DEFS[Game.currentTab];
                if (i < tab.length) {
                    const costEl = el.querySelector('.tower-cost');
                    if (costEl) {
                        const unlocked = Game.unlockedTowers.has(tab[i].id);
                        const canAfford = Game.money >= tab[i].cost;
                        costEl.style.color = (!canAfford && unlocked) ? '#f55' : '';
                    }
                }
            });
        }

        // Wave timer display
        if (Game.state === 'playing' && Game.pendingWave.length === 0 && Game.enemies.length === 0 && Game.wave < Game.maxWaves) {
            const secs = Math.ceil(Game.waveTimer / 60);
            document.getElementById('btnWave').textContent = 'SEND (' + secs + 's)';
        } else if (Game.wave >= Game.maxWaves && Game.enemies.length === 0) {
            document.getElementById('btnWave').textContent = 'COMPLETE';
        } else {
            document.getElementById('btnWave').textContent = 'SEND WAVE';
        }

        // Ability states
        const hasNuke = Game.towers.some(t => t.def.building === 'nuke');
        const hasWall = Game.towers.some(t => t.def.building === 'wall');
        const hasLab = Game.towers.some(t => t.def.building === 'lab');

        const nukeBtn = document.getElementById('abilNuke');
        const wallBtn = document.getElementById('abilWall');
        const freezeBtn = document.getElementById('abilFreeze');

        nukeBtn.className = 'ability-btn ' + (hasNuke ? (Game.nukeCooldown > 0 ? '' : 'available') : 'locked');
        wallBtn.className = 'ability-btn ' + (hasWall ? (Game.wallCooldown > 0 ? '' : 'available') : 'locked');
        freezeBtn.className = 'ability-btn ' + (hasLab ? (Game.freezeCooldown > 0 ? '' : 'available') : 'locked');

        if (Game.activeAbility === 'nuke') nukeBtn.classList.add('active-ability');
        if (Game.activeAbility === 'wall') wallBtn.classList.add('active-ability');
        if (Game.activeAbility === 'freeze') freezeBtn.classList.add('active-ability');

        // Cooldown overlays
        nukeBtn.querySelector('.cooldown-overlay').style.height = hasNuke ? (Game.nukeCooldown / Game.nukeCooldownMax * 100) + '%' : '100%';
        wallBtn.querySelector('.cooldown-overlay').style.height = hasWall ? (Game.wallCooldown / Game.wallCooldownMax * 100) + '%' : '100%';
        freezeBtn.querySelector('.cooldown-overlay').style.height = hasLab ? (Game.freezeCooldown / Game.freezeCooldownMax * 100) + '%' : '100%';

        // Wave preview
        if (Game.wave < Game.maxWaves) {
            const preview = makeEnemyDef(Game.wave + 1, Game.difficulty);
            const container = document.getElementById('waveEnemies');
            container.innerHTML = preview.map(e =>
                `<div class="preview-enemy" style="background:${e.color}" title="${e.type}${e.flying?' (air)':''}${e.shield?' [shield]':''}${e.autorepair?' [repair]':''}${e.jammer?' [jammer]':''}">
                    ${e.flying ? '\u25C7' : '\u25CF'}
                </div>`
            ).join('');
        }
    },

    renderTowerList() {
        const list = document.getElementById('towerList');
        const tab = TOWER_DEFS[Game.currentTab];
        list.innerHTML = '';

        for (const def of tab) {
            const unlocked = Game.unlockedTowers.has(def.id);
            const canAfford = Game.money >= def.cost;
            const div = document.createElement('div');
            div.className = 'tower-item' + (!unlocked ? ' locked' : '') + (Game.selectedTowerDef === def ? ' selected' : '');

            let lockText = '';
            if (!unlocked && def.unlockReq) {
                const r = def.unlockReq;
                if (r.type === 'build') lockText = `Build ${r.count} ${r.tower}`;
                if (r.type === 'build_type') lockText = `Build ${r.tower}`;
                if (r.type === 'money') lockText = `Have $${r.amount}`;
                if (r.type === 'wave') lockText = `Reach wave ${r.wave}`;
            }

            div.innerHTML = `
                <div class="tower-icon" style="background:${def.color}22;border:1px solid ${def.color}">${def.icon}</div>
                <div class="tower-info">
                    <div class="tower-name">${def.name}</div>
                    <div class="tower-cost" style="${canAfford||!unlocked?'':'color:#f55'}">$${def.cost}${(def.gridW||1)>1?' ('+def.gridW+'x'+def.gridH+')':''}</div>
                    <div class="tower-desc">${def.desc}</div>
                    ${!unlocked ? `<div class="tower-lock">\uD83D\uDD12 ${lockText}</div>` : ''}
                </div>
            `;

            if (unlocked) {
                div.addEventListener('click', () => {
                    Game.selectedTowerDef = Game.selectedTowerDef === def ? null : def;
                    Game.sellMode = false;
                    Game.activeAbility = null;
                    document.getElementById('btnSell').classList.remove('sell-mode');
                    document.querySelectorAll('.ability-btn').forEach(el => el.classList.remove('active-ability'));
                    Game.renderTowerList();
                });
            }

            list.appendChild(div);
        }
    },

    // ============================================================
    // GAME LOOP
    // ============================================================
    lastTime: 0,
    accumulator: 0,
    TICK_RATE: 1000 / 60,

    loop(timestamp) {
        if (!Game.lastTime) Game.lastTime = timestamp;
        const dt = timestamp - Game.lastTime;
        Game.lastTime = timestamp;

        Game.accumulator += dt;
        while (Game.accumulator >= Game.TICK_RATE) {
            Game.update();
            Game.accumulator -= Game.TICK_RATE;
        }

        Game.render();
        requestAnimationFrame(Game.loop);
    },
};

// Helper: hex to rgb string
function hexToRgb(hex) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    const r = parseInt(hex.substring(0,2), 16);
    const g = parseInt(hex.substring(2,4), 16);
    const b = parseInt(hex.substring(4,6), 16);
    return `${r},${g},${b}`;
}

// Scale game to fill viewport on large screens
function scaleGame() {
    const container = document.getElementById('gameContainer');
    const vw = window.innerWidth, vh = window.innerHeight;
    const gw = 1004, gh = 584; // container natural size (780 + 220 + 4 border)
    const scale = Math.min(vw / gw, vh / gh, 1.8);
    if (scale > 1.05) {
        container.style.transform = `scale(${scale})`;
    } else {
        container.style.transform = '';
    }
}
window.addEventListener('resize', scaleGame);

// Initialize
Game.init();
scaleGame();
</script>
